name: Desktop-Installer veröffentlichen

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: GitLab-Release-Tag im Format vX.Y.Z
        required: true
        type: string

concurrency:
  group: desktop-release-${{ inputs.source_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  windows:
    name: Windows-Installer bauen
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_TAG: ${{ inputs.source_tag }}

    steps:
      - name: Release-Tag prüfen
        shell: bash
        run: |
          if [[ ! "$SOURCE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ungültiger Release-Tag: $SOURCE_TAG" >&2
            exit 1
          fi
          echo "VERSION=${SOURCE_TAG#v}" >> "$GITHUB_ENV"

      - name: Verschlüsselten Desktop-Build-Kontext laden
        shell: bash
        env:
          DESKTOP_BUILD_CONTEXT_KEY: ${{ secrets.DESKTOP_BUILD_CONTEXT_KEY }}
        run: |
          test -n "$DESKTOP_BUILD_CONTEXT_KEY"
          gh release download "$SOURCE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern desktop-build-context.tar.gz.enc \
            --dir .
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in desktop-build-context.tar.gz.enc \
            -out desktop-build-context.tar.gz \
            -pass env:DESKTOP_BUILD_CONTEXT_KEY
          mkdir source
          tar -xzf desktop-build-context.tar.gz -C source
          rm desktop-build-context.tar.gz.enc desktop-build-context.tar.gz

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Abhängigkeiten installieren
        working-directory: source
        run: pnpm install --filter @dm-chat/desktop --frozen-lockfile

      - name: Desktop-Version abgleichen
        working-directory: source
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "Tag $SOURCE_TAG und Desktop-Version $PACKAGE_VERSION stimmen nicht überein." >&2
            exit 1
          fi

      - name: Windows-Installer bauen
        working-directory: source
        run: pnpm --filter @dm-chat/desktop dist:win

      - name: Installer für die Veröffentlichung vorbereiten
        shell: pwsh
        run: |
          $installer = Get-ChildItem "source/apps/desktop/release/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "electron-builder hat keinen Windows-Installer erzeugt."
          }

          $asset = "DM-Chat-$env:VERSION-Windows-x64.exe"
          Copy-Item $installer.FullName $asset

      - name: Windows-Installer bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: DM-Chat-*-Windows-x64.exe
          if-no-files-found: error
          retention-days: 1
