name: Desktop-Installer veröffentlichen

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: GitLab-Release-Tag im Format vX.Y.Z
        required: true
        type: string

concurrency:
  group: desktop-release-${{ inputs.source_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  windows:
    name: Windows-Installer bauen
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      SOURCE_TAG: ${{ inputs.source_tag }}

    steps:
      - name: Release-Tag prüfen
        shell: bash
        run: |
          if [[ ! "$SOURCE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ungültiger Release-Tag: $SOURCE_TAG" >&2
            exit 1
          fi
          echo "VERSION=${SOURCE_TAG#v}" >> "$GITHUB_ENV"

      - name: Verschlüsselten Desktop-Build-Kontext laden
        shell: bash
        env:
          DESKTOP_BUILD_CONTEXT_KEY: ${{ secrets.DESKTOP_BUILD_CONTEXT_KEY }}
          DESKTOP_BUILD_CONTEXT_URL: ${{ secrets.DESKTOP_BUILD_CONTEXT_URL }}
        run: |
          test -n "$DESKTOP_BUILD_CONTEXT_KEY"
          test -n "$DESKTOP_BUILD_CONTEXT_URL"
          curl -fsSL "$DESKTOP_BUILD_CONTEXT_URL" \
            -o desktop-build-context.tar.gz.enc
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in desktop-build-context.tar.gz.enc \
            -out desktop-build-context.tar.gz \
            -pass env:DESKTOP_BUILD_CONTEXT_KEY
          mkdir source
          tar -xzf desktop-build-context.tar.gz -C source
          rm desktop-build-context.tar.gz.enc desktop-build-context.tar.gz

      - name: Node.js einrichten
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: pnpm einrichten
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 9.15.9

      - name: Abhängigkeiten installieren
        working-directory: source
        run: pnpm install --filter @dm-chat/desktop --frozen-lockfile

      - name: Desktop-Version abgleichen
        working-directory: source
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "Tag $SOURCE_TAG und Desktop-Version $PACKAGE_VERSION stimmen nicht überein." >&2
            exit 1
          fi

      - name: Windows-Installer bauen
        working-directory: source
        run: pnpm --filter @dm-chat/desktop dist:win

      - name: Windows-Updateartefakte prüfen
        shell: pwsh
        run: |
          $release = "source/apps/desktop/release"
          $required = @(
            "$release/DM-Chat-$env:VERSION-Windows-x64.exe",
            "$release/DM-Chat-$env:VERSION-Windows-x64.exe.blockmap",
            "$release/latest.yml"
          )
          foreach ($asset in $required) {
            if (-not (Test-Path $asset -PathType Leaf)) {
              throw "Erwartetes Windows-Updateartefakt fehlt: $asset"
            }
          }

      - name: Windows-Updateartefakte bereitstellen
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-update-assets
          path: |
            source/apps/desktop/release/DM-Chat-*-Windows-x64.exe
            source/apps/desktop/release/DM-Chat-*-Windows-x64.exe.blockmap
            source/apps/desktop/release/latest.yml
          if-no-files-found: error
          retention-days: 1
